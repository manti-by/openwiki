name: Publish

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (latest, next, beta)"
        required: true
        default: latest

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.x

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - run: make install

      - run: make prepublish

      - name: Publish to npm
        run: npm publish --tag "${{ github.event.inputs.tag || 'latest' }}" --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
